<!-- Reusable phone frame (put it in a ~9:19 element box). Replace CONTENT; keep ids unique. -->
<div style="width:100%;height:100%;background:#0c0c0e;border-radius:44px;padding:12px;box-shadow:inset 0 0 0 2px rgba(255,255,255,0.08);font-family:var(--font-text);">
  <div style="width:100%;height:100%;background:var(--bg);border-radius:34px;overflow:hidden;display:flex;flex-direction:column;position:relative;">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 22px 4px;font-size:14px;font-weight:600;color:var(--text);">
      <span>9:41</span>
      <span style="width:86px;height:24px;background:#0c0c0e;border-radius:14px;margin:0 auto;position:absolute;left:0;right:0;top:8px;"></span>
      <span style="letter-spacing:0.06em;">&#9679;&#9679;&#9679;</span>
    </div>
    <div id="screen" style="flex:1;position:relative;">
      <!-- CONTENT -->
    </div>
  </div>
</div>
