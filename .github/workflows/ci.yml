name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    # No browser downloads at install (puppeteer-core is download-free; Chrome
    # is provisioned lazily at first render). Browser-dependent golden-frame CI
    # is a tracked M5 item.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: core/package-lock.json
      - name: Install
        working-directory: core
        run: npm ci
      - name: Build
        working-directory: core
        run: npx tsc
      - name: Unit tests (schema, gates, compiler, cache semantics)
        working-directory: core
        run: npx vitest run
      - name: Compiled skill artifacts are fresh
        run: node scripts/build-skills.mjs --check
      - name: Examples pass static gates
        run: |
          node core/dist/cli/index.js validate examples/launch-film/score.json
          node core/dist/cli/index.js validate examples/social-short/score.json
      - name: Packed artifact installs, imports, and runs
        working-directory: core
        run: |
          npm pack --silent
          TARBALL="$PWD/$(ls neeraj201999-chitra-*.tgz | tail -1)"
          SMOKE="$(mktemp -d)"
          cd "$SMOKE"
          npm init -y >/dev/null
          npm install --no-audit --no-fund "$TARBALL" >/dev/null
          node -e "import('@neeraj201999/chitra').then(m => { if (!m.validateScore) throw new Error('validateScore missing from exports'); console.log('import OK'); })"
          ./node_modules/.bin/chitra --version
          ./node_modules/.bin/chitra init smoke-film --style night --title "CI Smoke"
          ./node_modules/.bin/chitra validate smoke-film/score.json
